<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nexa LiveKit Viewer</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 16px; background: #f4f5f7; color: #111; }
    h2 { margin: 0 0 12px; }
    .panel { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; padding: 10px; border: 1px solid #d8dbe1; border-radius: 10px; background: #fff; }
    .panel-row { width: 100%; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    input, textarea { padding: 7px 8px; border: 1px solid #c8ccd4; border-radius: 8px; min-width: 0; font-family: monospace; }
    textarea { width: 100%; min-height: 60px; resize: vertical; }
    button { padding: 7px 12px; border: 1px solid #111; background: #111; color: #fff; border-radius: 8px; cursor: pointer; }
    button.secondary { background: #fff; color: #111; border-color: #c8ccd4; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    #status { margin: 8px 0 12px; color: #333; }
    #evidenceUrl { margin-top: 8px; word-break: break-all; font-size: 14px; color: #444; }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .tile {
      position: relative;
      background: #000;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }
    .tile video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .tile-label {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 4px 10px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 13px;
      border-radius: 4px;
      pointer-events: none;
    }
    .tile-meta {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.55);
      color: #ddd;
      font-size: 11px;
      font-family: monospace;
      border-radius: 4px;
      pointer-events: none;
    }
    #empty {
      grid-column: 1 / -1;
      padding: 32px;
      text-align: center;
      color: #888;
      border: 2px dashed #d8dbe1;
      border-radius: 8px;
      background: #fff;
    }
  </style>
</head>
<body>
  <h2>Nexa LiveKit — Multi-Camera Viewer</h2>

  <div class="panel">
    <div class="panel-row">
      <input id="serverUrl" placeholder="LiveKit server url" value="ws://localhost:7880" size="28" />
      <input id="tenantId" placeholder="Tenant id (room name)" value="tenant_01" />
      <input id="viewerId" placeholder="Viewer id (optional)" value="viewer_anas" />
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn" class="secondary" disabled>Disconnect</button>
    </div>
    <div class="panel-row">
      <label style="font-size: 13px; color: #555;">
        Token (paste a subscriber JWT generated on the server):
      </label>
      <textarea id="tokenInput" placeholder="Paste subscriber JWT here. Leave blank to try /api/v1/livekit/token endpoint."></textarea>
    </div>
  </div>

  <div class="panel">
    <div class="panel-row">
      <input id="alertId" placeholder="Alert id (e.g. tenant_01_cam_02_d1a5ba9304c5)" size="44" />
      <button id="openEvidenceBtn" class="secondary">Open alert evidence</button>
    </div>
    <div id="evidenceUrl"></div>
  </div>

  <div id="status">Disconnected</div>

  <div id="grid">
    <div id="empty">No cameras yet. Connect to see live tracks.</div>
  </div>

  <script type="module" src="./app.js?v=3"></script>
</body>
</html>
